name: Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/production.yml"
  workflow_dispatch:

concurrency:
  group: production-krashenayadoska
  cancel-in-progress: false

defaults:
  run:
    working-directory: site

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FETCH_UPLOADS_MAX_MISS: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Upload refs cache key
        id: uploads-cache-key
        working-directory: site
        run: |
          HASH=$(find lib content components app -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.json' \) -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')
          echo "key=uploads-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore uploads cache
        uses: actions/cache@v4
        with:
          path: site/public/uploads
          key: ${{ runner.os }}-${{ steps.uploads-cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-uploads-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm install
      - run: npm run build

      - name: Backup current site
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            BACKUP_DIR=~/backups/krashenayadoska-$(date +%Y%m%d-%H%M%S)
            mkdir -p "$BACKUP_DIR"
            cp -a /var/www/u3070106/data/www/krashenayadoska.ru "$BACKUP_DIR/" || true

      - name: Remove old build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            TARGET=/var/www/u3070106/data/www/krashenayadoska.ru
            find "$TARGET" -mindepth 1 -maxdepth 1 ! -name '.htaccess' -exec rm -rf {} +

      - name: Deploy static build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "site/out/"
          target: /var/www/u3070106/data/www/krashenayadoska.ru/
          strip_components: 2
          overwrite: true

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chown -R u3070106:u3070106 /var/www/u3070106/data/www/krashenayadoska.ru
