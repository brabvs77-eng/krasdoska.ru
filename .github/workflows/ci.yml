name: CI Build

on:
  push:
    branches: [main, develop]
    paths:
      - "site/**"
  pull_request:
    paths:
      - "site/**"

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
